spring.application.name=engine
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/binaryinves
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your_very_secret_key_here_make_it_long_at_least_32_characters_for_security
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.binary.engine=DEBUG
